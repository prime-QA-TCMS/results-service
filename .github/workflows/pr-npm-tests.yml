name: PR NPM Tests

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'PrimeQAUI/**'
      - 'user-service/**'
      - 'project-service/**'
      - 'testcase-service/**'
      - 'configuration-service/**'
      - 'results-service/**'
      - '.github/workflows/pr-npm-tests.yml'

permissions:
  contents: read

concurrency:
  group: pr-npm-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  npm-test:
    name: npm test - ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: PrimeQAUI
            path: PrimeQAUI
          - service: user-service
            path: user-service
          - service: project-service
            path: project-service
          - service: testcase-service
            path: testcase-service
          - service: configuration-service
            path: configuration-service
          - service: results-service
            path: results-service

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run tests
        run: npm test
