name: PR NPM Tests

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.find.outputs.dirs }}
    steps:
      - uses: actions/checkout@v4

      - id: find
        shell: bash
        run: |
          dirs=$(find . -name package.json \
            -not -path "*/node_modules/*" \
            -not -path "*/dist/*" \
            -not -path "*/build/*" \
            -not -path "*/coverage/*" \
            -exec dirname {} \; \
            | sed 's#^\./##' \
            | jq -R -s -c 'split("\n")[:-1]')

          echo "dirs=$dirs" >> "$GITHUB_OUTPUT"

  npm-test:
    needs: discover
    if: ${{ needs.discover.outputs.dirs != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJson(needs.discover.outputs.dirs) }}

    name: npm test - ${{ matrix.path }}

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run tests
        run: npm test
  
